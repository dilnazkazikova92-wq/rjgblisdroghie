<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FIFO PRO MAX - Inclusive Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --sidebar: #0f172a; --border: #e2e8f0; --danger: #f43f5e; --success: #10b981;
        }

        /* --- ИНКЛЮЗИВНЫЕ СТИЛИ --- */
        body.high-contrast {
            --bg: #000; --card: #000; --text: #fff; --primary: #ffff00; --border: #fff;
            font-size: 1.2em; /* Увеличенный шрифт для слабовидящих */
        }
        
        /* Эффект лупы при наведении */
        body.high-contrast .stat-value:hover { transform: scale(1.5); color: var(--primary); transition: 0.3s; }

        /* Вспышка для слабослышащих */
        @keyframes flash-screen { 0% { background: var(--danger); } 100% { background: var(--bg); } }
        .emergency-flash { animation: flash-screen 0.5s ease-out; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); color: white; padding: 25px; display: flex; flex-direction: column; }
        .nav-item { padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #94a3b8; transition: 0.2s; margin-bottom: 5px; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content { padding: 30px; overflow-y: auto; flex: 1; }

        /* UI CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .stat-value { font-size: 32px; font-weight: 800; display: block; margin: 10px 0; }

        /* FORM */
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        
        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #64748b; font-size: 12px; padding: 15px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }

        /* DOCK */
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 10px; border-radius: 50px; display: flex; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .dock-btn { background: transparent; border: none; color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .dock-btn.active { background: var(--primary); }

        /* TOAST */
        #toast { position: fixed; top: 30px; right: 30px; padding: 20px; border-radius: 15px; background: var(--sidebar); color: white; display: none; z-index: 1000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="toast"></div>

    <aside class="sidebar">
        <h2 style="margin-bottom: 40px;"><i class="fa fa-brain"></i> FIFO AI</h2>
        <div class="nav-item active" onclick="ui.tab('dash', this)"><i class="fa fa-gauge-high"></i> Панель управления</div>
        <div class="nav-item" onclick="ui.tab('stock', this)"><i class="fa fa-boxes-packing"></i> Склад</div>
        <div class="nav-item" onclick="ui.tab('anal', this)"><i class="fa fa-chart-line"></i> Аналитика</div>
        <div class="nav-item" onclick="ui.tab('profile', this)"><i class="fa fa-id-card"></i> Личный кабинет</div>
    </aside>

    <main class="main">
        <header class="header">
            <div id="voiceStatus" style="color: var(--primary); font-weight: 600;">
                <i class="fa fa-microphone-slash"></i> Помощник спит
            </div>
            <div style="display:flex; align-items:center; gap:20px;">
                <button class="btn" style="background:none; border:none; cursor:pointer;" onclick="app.startVoice()"><i class="fa fa-microphone"></i> Голосовой ввод</button>
                <div style="display:flex; align-items:center; gap:10px;">
                    <img id="headAv" src="https://ui-avatars.com/api/?name=Admin" style="width:40px; border-radius:50%">
                    <b id="headName">Admin</b>
                </div>
            </div>
        </header>

        <div class="content">
            
            <div id="tab-dash" class="tab-pane active">
                <div class="grid">
                    <div class="card">
                        <p>Оптимизация склада</p>
                        <span class="stat-value">94.2%</span>
                        <div style="height:5px; background:#eee; border-radius:5px;"><div style="width:94%; height:100%; background:var(--success); border-radius:5px;"></div></div>
                    </div>
                    <div class="card">
                        <p>Товаров в очереди</p>
                        <span class="stat-value" id="countVal">0</span>
                    </div>
                    <div class="card" style="border-left: 5px solid var(--danger);">
                        <p style="color:var(--danger)">Просрочка (риск)</p>
                        <span class="stat-value">2 шт.</span>
                    </div>
                </div>

                <div class="card">
                    <h3><i class="fa fa-plus-circle"></i> Быстрая приемка</h3>
                    <div class="input-group">
                        <input type="text" id="itemName" placeholder="Название (скажите 'Добавить яблоки')">
                        <input type="number" id="itemQty" placeholder="Кол-во">
                        <button onclick="app.addItem()" style="padding:12px 25px; border-radius:10px; border:none; background:var(--primary); color:white; cursor:pointer;">Принять</button>
                    </div>
                </div>

                <div class="card" style="margin-top:25px;">
                    <h3>Актуальные партии (FIFO)</h3>
                    <table id="stockTable">
                        <thead><tr><th>Товар</th><th>Поступление</th><th>Количество</th><th>Действие</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-profile" class="tab-pane" style="display:none">
                <div class="card" style="max-width:500px; margin:0 auto; text-align:center;">
                    <img id="pAvatar" src="https://ui-avatars.com/api/?name=Admin&size=128" style="width:120px; border-radius:30px; margin-bottom:20px;">
                    <h3>Настройки аккаунта</h3>
                    <input type="text" id="pNameInput" class="input-field" placeholder="Ваше имя" style="margin:20px 0; display:block; width:100%">
                    <button onclick="app.saveProfile()" style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--primary); color:white; cursor:pointer;">Сохранить изменения</button>
                </div>
            </div>

        </div>
    </main>

    <div class="dock">
        <button class="dock-btn active" onclick="ui.setMode('std', this)">Обычный</button>
        <button class="dock-btn" onclick="ui.setMode('vis', this)">👁️ Слабовидящий</button>
        <button class="dock-btn" onclick="ui.setMode('hear', this)">👂 Слабослышащий</button>
    </div>

    <script>
        const app = {
            stock: [
                { name: "Авокадо", qty: 45, date: "08.04.2026" },
                { name: "Манго", qty: 12, date: "07.04.2026" }
            ],

            addItem(name, qty) {
                const n = name || document.getElementById('itemName').value;
                const q = qty || document.getElementById('itemQty').value;
                if(!n || !q) return ui.notify("Ошибка: Заполните данные!", "danger");

                this.stock.unshift({ name: n, qty: q, date: "Сегодня" });
                this.render();
                ui.notify(`Принято: ${n} (${q} ед.)`, "success");
                ui.speak(`Товар ${n} успешно добавлен на склад`);
                
                document.getElementById('itemName').value = '';
                document.getElementById('itemQty').value = '';
            },

            render() {
                const tbody = document.querySelector('#stockTable tbody');
                tbody.innerHTML = '';
                this.stock.forEach((item, i) => {
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${item.name}</b></td>
                            <td>${item.date}</td>
                            <td>${item.qty} шт.</td>
                            <td><button onclick="app.remove(${i})" style="color:var(--danger); border:none; background:none; cursor:pointer"><i class="fa fa-trash"></i></button></td>
                        </tr>
                    `;
                });
                document.getElementById('countVal').innerText = this.stock.length;
            },

            remove(i) {
                ui.speak("Товар " + this.stock[i].name + " списан со склада");
                this.stock.splice(i, 1);
                this.render();
            },

            saveProfile() {
                const val = document.getElementById('pNameInput').value;
                if(val) {
                    document.getElementById('headName').innerText = val;
                    const url = `https://ui-avatars.com/api/?name=${val}&background=6366f1&color=fff`;
                    document.getElementById('pAvatar').src = url;
                    document.getElementById('headAv').src = url;
                    ui.notify("Профиль обновлен!");
                }
            },

            startVoice() {
                const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!Speech) return ui.notify("Голосовой ввод не поддерживается", "danger");
                
                const rec = new Speech();
                rec.lang = 'ru-RU';
                document.getElementById('voiceStatus').innerHTML = '<i class="fa fa-microphone"></i> Слушаю...';
                
                rec.onresult = (e) => {
                    const text = e.results[0][0].transcript.toLowerCase();
                    if(text.includes("добавить")) {
                        const parts = text.split(" ");
                        this.addItem(parts[1], parts[2] || 1);
                    }
                    document.getElementById('voiceStatus').innerHTML = '<i class="fa fa-microphone-slash"></i> Помощник спит';
                };
                rec.start();
            }
        };

        const ui = {
            tab(id, el) {
                document.querySelectorAll('.tab-pane').forEach(t => t.style.display = 'none');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('tab-' + id).style.display = 'block';
                if(el) el.classList.add('active');
            },

            setMode(mode, el) {
                document.body.classList.remove('high-contrast', 'deaf-mode');
                document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');

                if(mode === 'vis') {
                    document.body.classList.add('high-contrast');
                    this.speak("Включен режим для слабовидящих. Наводите на цифры для увеличения.");
                }
                if(mode === 'hear') {
                    document.body.classList.add('deaf-mode');
                    this.notify("Визуальные алерты активированы");
                }
            },

            notify(msg, type = "success") {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.style.display = 'block';
                t.style.background = type === 'danger' ? 'var(--danger)' : 'var(--sidebar)';
                
                if(document.body.classList.contains('deaf-mode')) {
                    document.body.classList.add('emergency-flash');
                    setTimeout(() => document.body.classList.remove('emergency-flash'), 500);
                }

                setTimeout(() => t.style.display = 'none', 3000);
            },

            speak(text) {
                if(document.body.classList.contains('high-contrast')) {
                    const utter = new SpeechSynthesisUtterance(text);
                    utter.lang = 'ru-RU';
                    window.speechSynthesis.speak(utter);
                }
            }
        };

        app.render();
    </script>
</body>
</html>
